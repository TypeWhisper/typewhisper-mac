name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-daily*'
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional exact release tag (for example v1.6.0-daily.20260719.1)
        required: false
        type: string

env:
  SCHEME: TypeWhisper
  PROJECT: TypeWhisper.xcodeproj

permissions:
  contents: write
  pages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      should_run: ${{ steps.resolve.outputs.should_run }}
    steps:
      - name: Checkout
        if: github.event_name != 'push'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$REQUESTED_TAG" ]; then
            if ! [[ "$REQUESTED_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9][A-Za-z0-9.-]*)?$ ]]; then
              echo "Invalid requested release tag: $REQUESTED_TAG" >&2
              exit 1
            fi
            echo "tag=$REQUESTED_TAG" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Requested release tag: $REQUESTED_TAG"
          else
            # Schedule or manual trigger - resolve the daily tag name
            # Tag format must match the exclusion pattern in push.tags above.
            # Do not create the tag here: a failed downstream job would otherwise
            # leave HEAD tagged and block all future retries for the same commit.
            VERSION=$(sed -n 's/.*MARKETING_VERSION = \([0-9.]*\);.*/\1/p' TypeWhisper.xcodeproj/project.pbxproj | head -1)
            DATE=$(date -u +%Y%m%d)
            TAG="v${VERSION}-daily.${DATE}"

            # Skip if HEAD already has an app release tag.
            EXISTING_TAGS=$(git tag --points-at HEAD | grep '^v[0-9]' || true)
            if [ -n "$EXISTING_TAGS" ]; then
              echo "HEAD already has app release tags: $EXISTING_TAGS - skipping daily"
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "tag=" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Skip if this daily tag already exists
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists - skipping"
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "tag=" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Planned daily tag: $TAG"
          fi

  verify-release-tools:
    needs: [prepare]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify Release Check Scripts
        run: |
          bash scripts/check_release_binary_instrumentation.sh --self-test
          bash scripts/check_release_signing.sh --self-test

  app-tests:
    needs: [prepare]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.3"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project $PROJECT \
            -scheme $SCHEME

      - name: Run App Tests
        run: |
          set -o pipefail
          xcodebuild test -project $PROJECT \
            -scheme $SCHEME \
            -destination 'platform=macOS,arch=arm64' \
            -parallel-testing-enabled NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | tee test.log

      - name: Check First-Party Warnings
        run: bash scripts/check_first_party_warnings.sh test.log

  plugin-sdk-tests:
    needs: [prepare]
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.3"

      - name: Run Plugin SDK Tests
        run: swift test --package-path TypeWhisperPluginSDK

  build:
    needs:
      - prepare
      - verify-release-tools
      - app-tests
      - plugin-sdk-tests
    if: needs.prepare.outputs.should_run == 'true'
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.3"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project $PROJECT \
            -scheme $SCHEME

      - name: Import Signing Certificate
        env:
          MACOS_SIGNING_P12: ${{ secrets.MACOS_SIGNING_P12 }}
          MACOS_SIGNING_PASSWORD: ${{ secrets.MACOS_SIGNING_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/typewhisper-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_SIGNING_P12" | base64 --decode > /tmp/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_SIGNING_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Verify Instrumentation Check Script
        run: |
          bash scripts/check_release_binary_instrumentation.sh --self-test
          bash scripts/check_release_signing.sh --self-test

      - name: Decode Developer ID Provisioning Profile
        env:
          MACOS_DEVELOPER_ID_PROVISIONING_PROFILE: ${{ secrets.MACOS_DEVELOPER_ID_PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH="${RUNNER_TEMP}/TypeWhisper.provisionprofile"
          printf '%s' "$MACOS_DEVELOPER_ID_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          chmod 600 "$PROFILE_PATH"
          echo "MACOS_DEVELOPER_ID_PROVISIONING_PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Archive and Export Developer ID App
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          RAW_VERSION="${RELEASE_TAG#v}"
          VERSION="${RAW_VERSION%%-*}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "Building version: $VERSION (build $BUILD_NUMBER)"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "DISPLAY_VERSION=$RAW_VERSION" >> $GITHUB_ENV

          RELEASE_CHANNEL="stable"
          IS_PRERELEASE="false"
          if [[ "$RAW_VERSION" == *"-daily"* ]]; then
            RELEASE_CHANNEL="daily"
            IS_PRERELEASE="true"
          elif [[ "$RAW_VERSION" == *-* ]]; then
            RELEASE_CHANNEL="release-candidate"
            IS_PRERELEASE="true"
          fi
          echo "RELEASE_CHANNEL=$RELEASE_CHANNEL" >> $GITHUB_ENV
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV

          set -o pipefail
          bash scripts/archive_release.sh \
            --archive-path build/TypeWhisper.xcarchive \
            --export-path build/export \
            --profile "$MACOS_DEVELOPER_ID_PROVISIONING_PROFILE_PATH" \
            --release-tag "$RELEASE_TAG" \
            --release-channel "$RELEASE_CHANNEL" \
            --build-number "$BUILD_NUMBER" \
            --signing-identity "$MACOS_SIGNING_IDENTITY" | tee build.log

      - name: Check First-Party Warnings
        run: bash scripts/check_first_party_warnings.sh build.log

      - name: Check Release Binary Instrumentation
        run: bash scripts/check_release_binary_instrumentation.sh build/export/TypeWhisper.app/Contents/MacOS/typewhisper-cli

      - name: Check Developer ID Signing
        run: bash scripts/check_release_signing.sh build/export/TypeWhisper.app

      - name: Notarize App
        env:
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8

          cd build/export
          ditto -c -k --keepParent TypeWhisper.app TypeWhisper-notarize.zip

          xcrun notarytool submit TypeWhisper-notarize.zip \
            --key /tmp/AuthKey.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple TypeWhisper.app
          rm -f TypeWhisper-notarize.zip

      - name: Verify Notarized App and Spawn
        run: |
          bash scripts/check_release_signing.sh \
            --require-notarization \
            --spawn \
            build/export/TypeWhisper.app

      - name: Install dmgbuild
        run: |
          VENV_DIR="${RUNNER_TEMP}/dmgbuild-venv"
          python3 -m venv "$VENV_DIR"
          source "$VENV_DIR/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install dmgbuild
          echo "$VENV_DIR/bin" >> $GITHUB_PATH

      - name: Create DMG
        run: |
          TAG="$RELEASE_TAG"
          APP_NAME="TypeWhisper"
          DMG_NAME="TypeWhisper-${TAG}.dmg"
          APP_PATH="build/export/TypeWhisper.app"
          SETTINGS="${GITHUB_WORKSPACE}/.github/dmgbuild-settings.py"
          BACKGROUND="${GITHUB_WORKSPACE}/.github/dmg-background.png"

          dmgbuild -s "$SETTINGS" \
            -D app="$APP_NAME" \
            -D app_path="$APP_PATH" \
            -D background="$BACKGROUND" \
            "$APP_NAME" \
            "build/export/${DMG_NAME}"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          if [ ! -f /tmp/AuthKey.p8 ]; then
            printf '%s' "$APPLE_API_KEY_P8" > /tmp/AuthKey.p8
            chmod 600 /tmp/AuthKey.p8
          fi

          DMG_PATH="build/export/TypeWhisper-${RELEASE_TAG}.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --key /tmp/AuthKey.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Create ZIP
        run: |
          cd build/export
          ditto -c -k --keepParent TypeWhisper.app "TypeWhisper-${RELEASE_TAG}.zip"

      - name: Cleanup Signing Assets
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -f /tmp/AuthKey.p8 /tmp/cert.p12

      - name: Sign ZIP with Sparkle EdDSA
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          TAG="$RELEASE_TAG"
          ZIP_PATH="build/export/TypeWhisper-${TAG}.zip"

          # Download Sparkle CLI tools
          SPARKLE_VERSION="2.8.1"
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle

          # Sign the ZIP
          SIGNATURE=$(/tmp/sparkle/bin/sign_update "$ZIP_PATH" --ed-key-file <(echo "$SPARKLE_EDDSA_KEY"))
          echo "SPARKLE_SIGNATURE<<EOF" >> $GITHUB_ENV
          echo "$SIGNATURE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Get file size
          ZIP_SIZE=$(stat -f%z "$ZIP_PATH")
          echo "ZIP_SIZE=$ZIP_SIZE" >> $GITHUB_ENV

      - name: Create GitHub Release
        run: |
          TAG="$RELEASE_TAG"
          RAW_VERSION="${TAG#v}"
          ASSET_DMG="build/export/TypeWhisper-${TAG}.dmg"
          ASSET_ZIP="build/export/TypeWhisper-${TAG}.zip"

          # Check if a draft release already exists (manual feature release notes)
          EXISTING_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo "")

          if [ "$EXISTING_DRAFT" = "true" ]; then
            echo "Draft release found for $TAG. Uploading assets and publishing..."
            gh release upload "$TAG" "$ASSET_DMG" "$ASSET_ZIP" --clobber
            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release edit "$TAG" --draft=false --prerelease
            else
              gh release edit "$TAG" --draft=false
            fi
          elif [ "$EXISTING_DRAFT" = "false" ]; then
            echo "Published release found for $TAG. Uploading assets..."
            gh release upload "$TAG" "$ASSET_DMG" "$ASSET_ZIP" --clobber
            if [ "$IS_PRERELEASE" = "true" ]; then
              gh release edit "$TAG" --prerelease
            fi
          else
            echo "No existing release. Generating notes from commits..."

            if [ "$RELEASE_CHANNEL" = "stable" ]; then
              # Stable notes should compare against the previous stable release,
              # not against an RC or daily tag that may point at the same commit.
              PREV_TAG=$(git tag --sort=-v:refname | grep '^v[0-9][0-9.]*$' | grep -v "^${TAG}$" | head -1)
            else
              # Pre-release notes can compare against the latest app tag of any prerelease type.
              PREV_TAG=$(git tag --sort=-v:refname | grep '^v[0-9]' | grep -v "^${TAG}$" | head -1)
            fi

            RANGE_END="$TAG"
            RELEASE_TARGET=""
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              RANGE_END="$(git rev-parse HEAD)"
              RELEASE_TARGET="$RANGE_END"
            fi

            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..${RANGE_END}"
            else
              RANGE="$RANGE_END"
            fi

            RELEASE_NOTES_FILE="docs/release-notes/${RAW_VERSION}.md"

            if [ -f "$RELEASE_NOTES_FILE" ]; then
              echo "Using curated release notes from $RELEASE_NOTES_FILE"
              CREATE_ARGS=(
                "$TAG"
                "$ASSET_DMG"
                "$ASSET_ZIP"
                --title "$TAG"
                --notes-file "$RELEASE_NOTES_FILE"
              )
            else

              # Parse commits into categories
              FEATURES=""
              FIXES=""
              OTHER=""

              while IFS= read -r line; do
                # Skip empty lines
                [ -z "$line" ] && continue

                # Extract message (remove short hash prefix)
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')

                # Filter out noise
                echo "$MSG" | grep -qiE '^(Merge |chore: bump|chore\(release\)|docs: update README)' && continue

                # Categorize by conventional commit prefix
                if echo "$MSG" | grep -qE '^feat(\(.*\))?:'; then
                  ENTRY=$(echo "$MSG" | sed 's/^feat\(([^)]*)\)\{0,1\}: //')
                  FEATURES="${FEATURES}- ${ENTRY}\n"
                elif echo "$MSG" | grep -qE '^fix(\(.*\))?:'; then
                  ENTRY=$(echo "$MSG" | sed 's/^fix\(([^)]*)\)\{0,1\}: //')
                  FIXES="${FIXES}- ${ENTRY}\n"
                else
                  # Strip any other conventional prefix for cleaner display
                  ENTRY=$(echo "$MSG" | sed 's/^[a-z]*\(([^)]*)\)\{0,1\}: //')
                  OTHER="${OTHER}- ${ENTRY}\n"
                fi
              done <<< "$(git log --oneline --no-merges "$RANGE")"

              # Build release notes
              NOTES=""
              if [ -n "$FEATURES" ]; then
                NOTES="${NOTES}## New Features\n${FEATURES}\n"
              fi
              if [ -n "$FIXES" ]; then
                NOTES="${NOTES}## Bug Fixes\n${FIXES}\n"
              fi
              if [ -n "$OTHER" ]; then
                NOTES="${NOTES}## Other Changes\n${OTHER}\n"
              fi

              # Fallback if no categorized commits
              if [ -z "$NOTES" ]; then
                NOTES="Maintenance release ${TAG}"
              fi

              CREATE_ARGS=(
                "$TAG"
                "$ASSET_DMG"
                "$ASSET_ZIP"
                --title "$TAG"
                --notes "$(printf '%b' "$NOTES")"
              )
            fi

            if [ "$IS_PRERELEASE" = "true" ]; then
              CREATE_ARGS+=(--prerelease)
            fi
            if [ -n "$RELEASE_TARGET" ]; then
              CREATE_ARGS+=(--target "$RELEASE_TARGET")
            fi

            gh release create "${CREATE_ARGS[@]}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate, Deploy, and Verify Sparkle Appcast
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$RELEASE_TAG"
          DOWNLOAD_URL="https://github.com/TypeWhisper/typewhisper-mac/releases/download/${TAG}/TypeWhisper-${TAG}.zip"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          # Parse edSignature and length from sign_update output
          # Format: sparkle:edSignature="..." length="..."
          ED_SIGNATURE=$(echo "$SPARKLE_SIGNATURE" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          ED_LENGTH=$(echo "$SPARKLE_SIGNATURE" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          # If parsing fails, fall back to ZIP_SIZE
          if [ -z "$ED_LENGTH" ]; then
            ED_LENGTH="$ZIP_SIZE"
          fi

          # Deploy to gh-pages branch
          cd "$GITHUB_WORKSPACE"
          git fetch origin gh-pages || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add -B gh-pages /tmp/gh-pages origin/gh-pages
          else
            git worktree add --detach /tmp/gh-pages
            cd /tmp/gh-pages
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi

          python3 scripts/update_appcast.py \
            --appcast /tmp/gh-pages/appcast.xml \
            --channel "$RELEASE_CHANNEL" \
            --title "Version ${DISPLAY_VERSION}" \
            --version "$DISPLAY_VERSION" \
            --build-version "$BUILD_NUMBER" \
            --pub-date "$PUB_DATE" \
            --url "$DOWNLOAD_URL" \
            --signature "$ED_SIGNATURE" \
            --length "$ED_LENGTH" \
            --minimum-system-version "14.0"

          cd /tmp/gh-pages
          git add appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update appcast for ${TAG}" || echo "No changes to commit"
          git push origin gh-pages

          cd "$GITHUB_WORKSPACE"
          python3 scripts/verify_appcast_publication.py \
            --url "https://typewhisper.github.io/typewhisper-mac/appcast.xml" \
            --version "$DISPLAY_VERSION" \
            --build-version "$BUILD_NUMBER" \
            --channel "$RELEASE_CHANNEL" \
            --download-url "$DOWNLOAD_URL" \
            --signature "$ED_SIGNATURE" \
            --length "$ED_LENGTH" \
            --maximum-cache-age-seconds 600 \
            --timeout-seconds 900 \
            --poll-interval-seconds 15

  trigger-website:
    if: "!contains(needs.prepare.outputs.tag, '-')"
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          gh api repos/TypeWhisper/typewhisper.com/dispatches \
            -f event_type=release-published
        env:
          GITHUB_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}

  update-homebrew:
    if: "!contains(needs.prepare.outputs.tag, '-')"
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          DMG_URL="https://github.com/TypeWhisper/typewhisper-mac/releases/download/${TAG}/TypeWhisper-${TAG}.dmg"

          curl -L -o TypeWhisper.dmg "$DMG_URL"
          SHA256=$(shasum -a 256 TypeWhisper.dmg | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/TypeWhisper/homebrew-tap.git"
          cd homebrew-tap

          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/typewhisper.rb
          sed -i "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" Casks/typewhisper.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/typewhisper.rb
          git diff --cached --quiet || git commit -m "Update TypeWhisper to ${VERSION}"
          git push
